name: Publish to PyPI and Release on GitHub
description: |
  This workflow builds a Python package and publishes it to PyPI when a new version tag is pushed.
  It also creates a GitHub release with the built package files.

on:
  push:
    tags:
      - 'v*.*.*'      # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual triggering of the workflow

permissions:
  contents: write     # Required for creating releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Specify your Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest
          pip install -e .

      # A release to PyPI cannot be undone — a bad version can only be yanked,
      # and the version number is burned forever. So the tag must not be able
      # to ship code that does not pass its own tests.
      - name: Run tests
        run: pytest -m "not integration and not django" -v

      - name: Build package
        run: python -m build

      - name: Check the distribution
        run: python -m twine check dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
